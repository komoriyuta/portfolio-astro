<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">School festival order management system</title>
  <desc id="desc">Order entry and kitchen status screens synchronized through a database.</desc>
  <defs>
