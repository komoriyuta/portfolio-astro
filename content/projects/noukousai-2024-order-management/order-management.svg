      <stop offset="0" stop-color="#fff7ea"/>
      <stop offset="1" stop-color="#f2eadf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#5f4530" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="92" y="90" width="410" height="495" rx="28" fill="#fff" stroke="#372f2a" stroke-width="6"/>
